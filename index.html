<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Игра: 100 английских глаголов</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="bg-shape bg-shape-1" aria-hidden="true"></div>
  <div class="bg-shape bg-shape-2" aria-hidden="true"></div>

  <main class="app">
    <header class="app-header">
      <h1>Тренажер глаголов</h1>
      <p>Карточки + практика + озвучка</p>
    </header>

    <nav class="tabs" aria-label="Режимы">
      <button class="tab is-active" data-mode="cards" type="button">Карточки</button>
      <button class="tab" data-mode="quiz" type="button">Практика</button>
      <button class="tab" data-mode="list" type="button">Список</button>
    </nav>

    <section class="panel study-group-panel">
      <div class="group-toolbar">
        <label class="group-picker">
          Учебная группа
          <select id="group-select">
            <option value="1">Группа 1 · Формы не меняются</option>
            <option value="2">Группа 2 · Короткие формы на -t / -d</option>
            <option value="3">Группа 3 · Частые короткие формы</option>
            <option value="4">Группа 4 · Семья -ought / -aught</option>
            <option value="5">Группа 5 · Чередование i-a-u</option>
            <option value="6">Группа 6 · Формы на -ew / -own</option>
            <option value="7">Группа 7 · Формы на -oke / -oken</option>
            <option value="8">Группа 8 · Сильные формы на -n</option>
            <option value="9">Группа 9 · Сильные и особые формы</option>
            <option value="10">Группа 10 · Бытовые и разговорные</option>
          </select>
        </label>
        <p id="group-summary" class="result">Выберите группу: можно через список или кнопки ниже.</p>
      </div>
      <div id="group-buttons" class="group-buttons" role="group" aria-label="Выбор учебной группы">
        <button class="group-button is-active" data-group-id="1" type="button">Группа 1</button>
        <button class="group-button" data-group-id="2" type="button">Группа 2</button>
        <button class="group-button" data-group-id="3" type="button">Группа 3</button>
        <button class="group-button" data-group-id="4" type="button">Группа 4</button>
        <button class="group-button" data-group-id="5" type="button">Группа 5</button>
        <button class="group-button" data-group-id="6" type="button">Группа 6</button>
        <button class="group-button" data-group-id="7" type="button">Группа 7</button>
        <button class="group-button" data-group-id="8" type="button">Группа 8</button>
        <button class="group-button" data-group-id="9" type="button">Группа 9</button>
        <button class="group-button" data-group-id="10" type="button">Группа 10</button>
      </div>
    </section>

    <section class="panel mode mode-cards is-active" data-panel="cards">
      <div class="mode-switch" role="group" aria-label="Тип карточек">
        <button class="mini-switch cards-dir is-active" data-cards-dir="en-ru" type="button">EN → RU</button>
        <button class="mini-switch cards-dir" data-cards-dir="ru-en" type="button">RU → EN</button>
      </div>

      <div class="card-head">
        <span class="badge" id="cards-index">0 / 0</span>
        <div class="inline-actions">
          <button class="ghost" id="cards-speak-word" type="button">Слово</button>
          <button class="ghost" id="cards-speak-forms" type="button">Формы</button>
        </div>
      </div>
      <div class="progress-strip">
        <span class="progress-pill" id="cards-status">Статус</span>
        <span class="progress-pill" id="cards-rating">Рейтинг</span>
      </div>
      <h2 id="cards-main">—</h2>
      <p id="cards-hint">—</p>
      <p id="cards-mode-note" class="result"> </p>

      <form id="cards-guess-form" class="inline-form" autocomplete="off">
        <label>
          <span id="cards-guess-label">Введите перевод на русский</span>
          <input id="cards-guess-input" type="text" placeholder="Например: быть">
        </label>
        <button type="submit">Проверить</button>
      </form>
      <p id="cards-guess-result" class="result"> </p>

      <div class="answers" id="cards-answers" hidden>
        <div class="answer-row">
          <span class="label">Base:</span>
          <span id="cards-base"></span>
        </div>
        <div class="answer-row">
          <span class="label">Past:</span>
          <span id="cards-past"></span>
        </div>
        <div class="answer-row">
          <span class="label">Participle:</span>
          <span id="cards-participle"></span>
        </div>
        <div class="answer-row" id="cards-ru-row">
          <span class="label">Перевод:</span>
          <span id="cards-ru-answer"></span>
        </div>
      </div>

      <div class="actions">
        <button id="cards-toggle" type="button">Показать ответ</button>
        <button id="cards-next" type="button">Следующий</button>
      </div>
    </section>

    <section class="panel mode mode-quiz" data-panel="quiz">
      <div class="mode-switch" role="group" aria-label="Тип тренировки">
        <button class="mini-switch quiz-dir is-active" data-quiz-dir="ru-all" type="button">RU → 3 формы (по полям)</button>
        <button class="mini-switch quiz-dir" data-quiz-dir="en-ru" type="button">Формы → RU</button>
      </div>

      <div class="card-head">
        <span class="badge" id="quiz-score">0 / 0</span>
        <div class="inline-actions">
          <button class="ghost" id="quiz-speak-word" type="button">Слово</button>
          <button class="ghost" id="quiz-speak-forms" type="button">Формы</button>
        </div>
      </div>
      <div class="progress-strip">
        <span class="progress-pill" id="quiz-status">Статус</span>
        <span class="progress-pill" id="quiz-rating">Рейтинг</span>
      </div>
      <h2 id="quiz-main">—</h2>
      <p id="quiz-sub">—</p>
      <p id="quiz-clarify" class="helper-note" hidden></p>

      <form id="quiz-form" autocomplete="off">
        <label id="quiz-field-base">
          1-я форма (Base)
          <input id="quiz-input-base" type="text" placeholder="Например: go">
        </label>
        <label id="quiz-field-past">
          2-я форма (Past)
          <input id="quiz-input-past" type="text" placeholder="Например: went">
        </label>
        <label id="quiz-field-participle">
          3-я форма (Participle)
          <input id="quiz-input-participle" type="text" placeholder="Например: gone">
        </label>
        <label id="quiz-field-ru" hidden>
          Перевод на русский
          <input id="quiz-input-ru" type="text" placeholder="Например: идти, ехать">
        </label>
        <div class="actions">
          <button type="submit">Проверить</button>
          <button id="quiz-next" type="button">Следующий</button>
        </div>
      </form>
      <p id="quiz-result" class="result"> </p>
    </section>

    <section class="panel mode mode-list" data-panel="list">
      <div class="list-toolbar">
        <label class="search">
          Поиск
          <input id="list-search" type="search" placeholder="Введите глагол или перевод">
        </label>
        <div class="mode-switch" role="group" aria-label="Фильтр выученности">
          <button class="mini-switch list-filter is-active" data-list-filter="all" type="button">Все</button>
          <button class="mini-switch list-filter" data-list-filter="learning" type="button">Не выучено</button>
          <button class="mini-switch list-filter" data-list-filter="mastered" type="button">Выучено</button>
        </div>
      </div>
      <p id="list-summary" class="result"> </p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Base</th>
              <th>Past</th>
              <th>Participle</th>
              <th>Перевод</th>
              <th>Статус</th>
              <th>Рейтинг</th>
              <th>Voice</th>
            </tr>
          </thead>
          <tbody id="list-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./verbs-data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
